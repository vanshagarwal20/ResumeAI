server:
  port: 8084
  servlet:
    context-path: /

spring:
  application:
    name: ai-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:resumeai123}
      database: 1
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 5000ms
        shutdown-timeout: 200ms
      connect-timeout: 5000ms

  cache:
    type: redis

  datasource:
    url: jdbc:mysql://localhost:3306/resumeai_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:cmVzdW1lYWktc3VwZXItc2VjcmV0LWtleS1mb3ItaHMyNTYtanN0LWZvci1kZXZlbG9wbWVudA==}

services:
  resume-service-url: ${RESUME_SERVICE_URL:http://localhost:8082}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}

ai:
  free-tier-monthly-limit: 5
  free-tier-ats-monthly-limit: 3
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
    url: ${ANTHROPIC_API_URL:https://api.anthropic.com/v1/messages}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.resumeai.ai: DEBUG
    org.springframework.security: WARN
